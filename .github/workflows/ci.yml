name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: npx playwright-core install --with-deps chromium
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run check
      - run: npm test
      - run: npm run test:webview-acceptance
      - if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: webview-visual-evidence
          path: |
            tmp/screenshots-actual/
            tmp/screenshots-diff/
          if-no-files-found: ignore
      - run: npm run license:check
      - run: npm audit --omit=dev
      - run: python -m pip_audit
      - run: npm run package -- --out openwrangler.vsix
      - run: npm run verify:vsix -- openwrangler.vsix
      - run: npm run build:test-extension
      - id: packaged_editor
        name: Test packaged editor
        run: node scripts/run-packaged-editor-tests.mjs openwrangler.vsix
        env:
          OPEN_WRANGLER_PACKAGED_EDITORS: vscode
          VSCODE_TEST_VERSION: stable
      - name: Upload packaged-editor failure diagnostics
        if: ${{ always() && steps.packaged_editor.outcome == 'failure' && steps.packaged_editor.outputs.evidence_ready == 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: packaged-editor-diagnostics-vscode-${{ runner.os }}-${{ github.run_attempt }}
          path: ${{ steps.packaged_editor.outputs.evidence_path }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          include-hidden-files: false
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: openwrangler-vsix
          path: openwrangler.vsix

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e "python[dev]"
      - run: npm run test:coverage
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-reports
          path: |
            coverage/
            tmp/coverage/python.xml

  python-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: python -m pytest python/tests -q

  extension-host:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vscode: ["1.105.0", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e "python[dev]"
      - run: npm run test:extension-host
        env:
          VSCODE_TEST_VERSION: ${{ matrix.vscode }}

  native-editor-matrix:
    name: Native editor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: npm run test:scripts
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run test:extension-host
        env:
          VSCODE_TEST_VERSION: stable
      - run: npm run package -- --out openwrangler.vsix
      - run: npm run verify:vsix -- openwrangler.vsix
      - run: npm run build:test-extension
      - id: packaged_editor
        name: Test packaged editor
        run: node scripts/run-packaged-editor-tests.mjs openwrangler.vsix
        env:
          OPEN_WRANGLER_PACKAGED_EDITORS: vscode
          VSCODE_TEST_VERSION: stable
      - name: Upload packaged-editor failure diagnostics
        if: ${{ always() && steps.packaged_editor.outcome == 'failure' && steps.packaged_editor.outputs.evidence_ready == 'true' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: packaged-editor-diagnostics-vscode-${{ runner.os }}-${{ github.run_attempt }}
          path: ${{ steps.packaged_editor.outputs.evidence_path }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          include-hidden-files: false
