name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run check
      - run: npm test
      - run: npm audit --omit=dev
      - run: python -m pip_audit
      - run: npm run package -- --out data-explorer.vsix
      - run: npm run verify:vsix -- data-explorer.vsix
      - run: npm run test:packaged-editors -- data-explorer.vsix
        env:
          DATA_EXPLORER_PACKAGED_EDITORS: vscode
          VSCODE_TEST_VERSION: stable
      - uses: actions/upload-artifact@v6
        with:
          name: data-explorer-vsix
          path: data-explorer.vsix

  python-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: python -m pytest python/tests -q

  extension-host:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vscode: ["1.105.0", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install -e "python[dev]"
      - run: xvfb-run -a npm run test:extension-host
        env:
          VSCODE_TEST_VERSION: ${{ matrix.vscode }}
