name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run check
      - run: npm test
      - run: npm audit --omit=dev
      - run: python -m pip_audit
      - run: npm run package -- --out data-explorer.vsix
      - run: npm run verify:vsix -- data-explorer.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: data-explorer-vsix
          path: data-explorer.vsix

  python-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: python -m pytest python/tests -q
