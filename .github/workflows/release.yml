name: Release VSIX

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run package -- --out data-explorer.vsix
      - run: npm run verify:vsix -- data-explorer.vsix
      - run: sha256sum data-explorer.vsix > data-explorer.vsix.sha256
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            data-explorer.vsix
            data-explorer.vsix.sha256
