name: Release VSIX

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run check
      - run: npm test
      - run: npm run license:check
      - run: npm run package -- --out openwrangler.vsix
      - run: npm run verify:vsix -- openwrangler.vsix

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run package -- --out openwrangler.vsix
      - run: npm run verify:vsix -- openwrangler.vsix
      - run: sha256sum openwrangler.vsix > openwrangler.vsix.sha256
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            openwrangler.vsix
            openwrangler.vsix.sha256
