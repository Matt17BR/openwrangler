name: Cross-platform runtime

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  runtime:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: npm run typecheck
      - run: npm test
      - run: npm run license:check
      - run: npm run package -- --out openwrangler.vsix
      - run: npm run verify:vsix -- openwrangler.vsix
