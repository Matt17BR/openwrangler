name: Performance gates

on:
  workflow_dispatch:
  schedule:
    - cron: "41 5 * * 2"

permissions:
  contents: read

jobs:
  polars-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "python[dev]"
      - run: python python/benchmarks/runtime_performance.py --strict --json-out performance.json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: polars-runtime-performance
          path: performance.json
