[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "data-wrangler-runtime"
version = "0.2.0a1"
description = "Runtime backend for the Data Explorer VS Code extension."
requires-python = ">=3.10"
dependencies = [
  "polars",
  "pandas",
  "pyarrow",
  "openpyxl",
  "ipython"
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-cov",
  "nbclient",
  "nbformat",
  "ipykernel",
  "fastexcel",
  "tornado>=6.5.7",
  "ruff",
  "pip-audit"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["data_wrangler_runtime*"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
include = ["data_wrangler_runtime", "tests"]
